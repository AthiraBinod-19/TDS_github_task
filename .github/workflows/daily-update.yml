name: Daily Repository Update

permissions:
  contents: write

on:
  schedule:
    - cron: '30 14 * * *'   # Runs daily at 14:30 UTC
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f3002388@ds.study.iitm.ac.in"

      - name: Daily commit - 22f3002388@ds.study.iitm.ac.in
        run: |
          echo "Updated on $(date +'%Y-%m-%d %H:%M:%S')" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update $(date +'%Y-%m-%d %H:%M:%S')"
          git push
